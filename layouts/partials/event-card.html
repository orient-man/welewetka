<article class="event-card">
  {{ $eventDate := .Params.event_date | default .Date }}
  <div class="event-card__date">
    <span class="event-card__day">{{ (time $eventDate).Day }}</span>
    <span class="event-card__month">{{ dateFormat "Jan" (time $eventDate) }}</span>
    <span class="event-card__year">{{ (time $eventDate).Year }}</span>
  </div>
  <div class="event-card__body">
    <h3 class="event-card__title">
      <a href="{{ .Permalink }}">{{ .Title }}</a>
    </h3>
    {{ with .Params.venue }}
    <p class="event-card__venue">{{ . }}</p>
    {{ end }}
    {{ with .Summary }}
    <p class="event-card__summary">{{ . }}</p>
    {{ end }}
  </div>
</article>
