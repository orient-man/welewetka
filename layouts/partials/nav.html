<nav class="nav" role="navigation" aria-label="Menu główne">
  <div class="nav__inner container">
    <a href="{{ "/" | relURL }}" class="nav__logo">

    </a>

    <button class="nav__hamburger" aria-label="Otwórz menu" aria-expanded="false" aria-controls="nav-menu">
      <span class="nav__hamburger-line"></span>
      <span class="nav__hamburger-line"></span>
      <span class="nav__hamburger-line"></span>
    </button>

    <ul class="nav__menu" id="nav-menu">
      {{ range site.Menus.main }}
      <li class="nav__item">
        <a href="{{ .URL | relURL }}" class="nav__link{{ if $.IsMenuCurrent "main" . }} nav__link--active{{ end }}">
          {{ .Name }}
        </a>
      </li>
      {{ end }}
    </ul>
  </div>
