<!DOCTYPE html>
<html lang="{{ site.Language.Lang }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <div class="page-wrapper">
    {{ partial "nav.html" . }}
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
  </div>
  {{ $nav := resources.Get "js/nav.js" | minify | fingerprint }}
  <script src="{{ $nav.RelPermalink }}" defer></script>
  {{ block "scripts" . }}{{ end }}
</body>
</html>
